apiVersion: v1
kind: ConfigMap
metadata:
  name: careeros-config
  namespace: career-os
  labels:
    app.kubernetes.io/part-of: career-os
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  POSTGRES_HOST: "careeros-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "career_os"
  REDIS_HOST: "careeros-redis"
  REDIS_PORT: "6379"
  API_GATEWAY_PORT: "4000"
  USER_SERVICE_PORT: "4001"
