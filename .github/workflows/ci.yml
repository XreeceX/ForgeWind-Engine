name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://forgewind:forgewind_dev@localhost:5432/forgewind?schema=public
  JWT_SECRET: ci-jwt-secret-minimum-32-characters-long
  JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-chars
  NEXTAUTH_SECRET: ci-nextauth-secret-minimum-32-chars-long
  NEXTAUTH_URL: http://localhost:3000
  NEXT_PUBLIC_FORGEWIND_API_URL: http://localhost:3001
  NEXT_PUBLIC_API_URL: http://localhost:8090/api/v1
  CORS_ORIGIN: http://localhost:3000
  OPENAI_API_KEY: sk-ci-placeholder-key-for-build-only
  PINECONE_API_KEY: ci-placeholder
  PINECONE_INDEX: forgewind

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  docker-build:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build api-gateway image
        run: docker build -f apps/api-gateway/Dockerfile .

      - name: Build user-service image
        run: docker build -f services/user-service/Dockerfile .
