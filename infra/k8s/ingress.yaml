apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: careeros-ingress
  namespace: career-os
  labels:
    app.kubernetes.io/part-of: career-os
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.careeros.dev
      secretName: careeros-tls
  rules:
    - host: api.careeros.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 4000
