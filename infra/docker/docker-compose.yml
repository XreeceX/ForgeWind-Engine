version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: careeros-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: careeros_forge
      POSTGRES_PASSWORD: careeros_forge_dev
      POSTGRES_DB: careeros_forge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - careeros-forge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careeros_forge -d careeros_forge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: careeros-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - careeros-forge-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: careeros-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@forgeengine.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - careeros-forge-network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  careeros-forge-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
