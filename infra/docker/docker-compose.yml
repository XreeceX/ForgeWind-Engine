version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: forgewind-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: forgewind
      POSTGRES_PASSWORD: forgewind_dev
      POSTGRES_DB: forgewind
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - forgewind-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgewind -d forgewind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: forgewind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - forgewind-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: forgewind-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@forgeengine.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - forgewind-network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  forgewind-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
