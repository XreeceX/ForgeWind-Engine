apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: careeros-forge
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: careeros-forge
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
      name: http
