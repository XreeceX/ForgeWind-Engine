apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: careeros-forge
  labels:
    app: user-service
    app.kubernetes.io/part-of: careeros-forge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: careeros-forge/user-service:latest
          ports:
            - containerPort: 4001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: careeros-forge-config
            - secretRef:
                name: careeros-forge-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
